services:
  db:
    image: postgres:15
    container_name: postgres-reservas
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend-reservas
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/reservas

  frontend:
    build: ./frontend
    container_name: frontend-reservas
    ports:
      - "5000:5000"
    depends_on:
      - backend

volumes:
  pgdata: